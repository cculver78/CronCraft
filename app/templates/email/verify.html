<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body style="margin:0; padding:0; background-color:#0a0e0c; font-family:'Courier New', monospace;">
    <table width="100%" cellpadding="0" cellspacing="0" style="background-color:#0a0e0c; padding:40px 20px;">
        <tr>
            <td align="center">
                <table width="500" cellpadding="0" cellspacing="0" style="background-color:#0f1410; border:1px solid rgba(34,197,94,0.12); border-radius:8px; overflow:hidden;">
                    <tr>
                        <td style="padding:30px 30px 20px; border-bottom:1px solid rgba(34,197,94,0.12);">
                            <span style="font-size:15px; font-weight:700; color:#e8f0e8; letter-spacing:-0.02em;">CronCraft&trade;</span>
                        </td>
                    </tr>
                    <tr>
                        <td style="padding:30px;">
                            <h2 style="font-size:20px; color:#e8f0e8; margin:0 0 16px;">Verify your email</h2>
                            <p style="font-size:14px; color:#6b7d6b; line-height:1.7; margin:0 0 24px;">
                                Click the button below to verify your email address and activate your CronCraft&trade; account.
                            </p>
                            <a href="{{ verify_url }}" style="display:inline-block; background-color:#22c55e; color:#0a0e0c; padding:12px 24px; border-radius:4px; font-size:13px; font-weight:700; text-decoration:none; letter-spacing:0.02em;">Verify Email</a>
                            <p style="font-size:12px; color:#3d4d3d; line-height:1.7; margin:24px 0 0;">
                                If you didn't create a CronCraft account, you can safely ignore this email.
                            </p>
                            <p style="font-size:11px; color:#3d4d3d; margin:16px 0 0; word-break:break-all;">
                                Or copy this link: {{ verify_url }}
                            </p>
                        </td>
                    </tr>
                    <tr>
                        <td style="padding:20px 30px; border-top:1px solid rgba(34,197,94,0.12); font-size:11px; color:#3d4d3d;">
                            &copy; 2026 CronCraft&trade; &mdash; Edge Case Software, LLC
                        </td>
                    </tr>
                </table>
            </td>
        </tr>
    </table>
</body>
</html>
