{% extends "base.html" %}

{% block title %}Reset Password — CronCraft™{% endblock %}

{% block content %}
<div class="form-container">
    <h2 class="form-title">Set new password</h2>
    <p class="form-sub">Enter your new password below.</p>
    
    <form method="POST" action="{{ url_for('auth.reset_password', token=token) }}">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div class="form-group">
            <label class="form-label" for="password">New Password</label>
            <input class="form-input" type="password" id="password" name="password" required minlength="8">
        </div>
        
        <div class="form-group">
            <label class="form-label" for="confirm_password">Confirm Password</label>
            <input class="form-input" type="password" id="confirm_password" name="confirm_password" required minlength="8">
        </div>
        
        <button type="submit" class="btn-primary btn-submit">Reset Password</button>
    </form>
    
    <div class="auth-links">
        <a href="{{ url_for('auth.login') }}">Back to Sign In</a>
    </div>
</div>
{% endblock %}
