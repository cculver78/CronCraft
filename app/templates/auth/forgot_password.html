{% extends "base.html" %}

{% block title %}Forgot Password — CronCraft™{% endblock %}

{% block content %}
<div class="form-container">
    <h2 class="form-title">Reset password</h2>
    <p class="form-sub">Enter your email and we'll send you a link to reset your password.</p>
    
    <form method="POST" action="{{ url_for('auth.forgot_password') }}">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div class="form-group">
            <label class="form-label" for="email">Email Address</label>
            <input class="form-input" type="email" id="email" name="email" required autofocus>
        </div>
        
        <button type="submit" class="btn-primary btn-submit">Send Reset Link</button>
    </form>
    
    <div class="auth-links">
        <a href="{{ url_for('auth.login') }}">Back to Sign In</a>
    </div>
</div>
{% endblock %}
