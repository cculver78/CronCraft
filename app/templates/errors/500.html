{% extends "base.html" %}

{% block title %}500 — CronCraft™{% endblock %}

{% block content %}
<section style="text-align: center; padding: 6rem 2rem;">
    <div class="terminal" style="max-width: 400px; margin: 0 auto;">
        <div class="terminal-bar">
            <div class="tb-dot tb-red"></div>
            <div class="tb-dot tb-amber"></div>
            <div class="tb-dot tb-green"></div>
            <span class="terminal-title">croncraft &mdash; panic</span>
        </div>
        <div class="terminal-body" style="text-align: center;">
            <h1 style="font-size: 4rem; color: var(--amber); margin-bottom: 1rem;">500</h1>
            <p style="color: var(--text-muted); margin-bottom: 2rem;">
                <span class="t-prompt">$</span> ./process-request<br>
                <span style="color: var(--amber);">[!] segmentation fault (core dumped)</span>
            </p>
            <a href="{{ url_for('main.index') }}" class="btn-ghost">Reboot system</a>
        </div>
    </div>
</section>
{% endblock %}
